apiVersion: apps/v1
kind: Deployment
metadata:
  name: time-tracker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: time-tracker
  template:
    metadata:
      labels:
        app: time-tracker
    spec:
      containers:
      - name: time-tracker-container
        image: time-tracker-app:$BUILD_NUMBER
        imagePullPolicy: Always
        ports:
        - containerPort: 5173